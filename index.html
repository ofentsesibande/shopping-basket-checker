
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Shopping Basket</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="page">
            <div class="card">
                <header class="card__reader">
                    <span class="eyebrow">JS Array Methods Practice</span>
                    <h1>Shopping Basket Checker</h1>
                </header>

                <section class="entry">
                    <h2 id="prompt">Enter price of item (R):</h2>
                    
                    <div class="entry__row">
                        <span class="currency-prefix">R</span>
                    <input type='number' id='price-input' placeholder='e.g 49.99' step='0.01'  min='0'>
                    <button id='add-btn'>Add Item</button>
                    </div>

                    <div class="progress" aria-hidden="true">
                        <span class="progress__dot is-filled"></span>
                        <span class="progress__dot"></span>
                        <span class="progress__dot"></span>
                        <span class="progress__dot"></span>
                        <span class="progress__dot"></span>
                    </div>
                </section>

                <section class="receipt">
                    <div id="results"></div>
                </section>
            </div>

            <p class="footnote">Built with <code>reduce()</code>, <code>filter()</code>, <code>map()</code>, <code>sort()</code> &amp; <code>includes()</code></p>
        </main>
    <script src="script.js" async defer></script>
    </body>
</html>
